name: "FIQL Query Demo"
app_id: "demo-fiql"
customer_id: "yeti"
version: "1.0.0"
description: "50+ query examples covering equality, ranges, full-text search, joins, sorting, and pagination"
schemas:
  path: schemas/fiql.graphql

resources:
  path: []
  root: /api

dataLoader: data/*.json

static:
  path: web
  root: /
  spa: true
  build:
    source: source
    command: npm install && npm run build